<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="760" viewBox="0 0 1360 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <linearGradient id="headerBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#214a70"/>
    </linearGradient>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #f8fafc; }
      .sub { font-family: Arial, sans-serif; font-size: 22px; fill: #dbeafe; }
      .chip { fill: #ffffff; stroke: #5f7fa0; stroke-width: 1.8; rx: 10; ry: 10; }
      .chipText { font-family: Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #1e3a5f; }
      .card { fill: #ffffff; stroke: #6b89a7; stroke-width: 2; rx: 14; ry: 14; }
      .cardTitle { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #1f3f61; }
      .metric { font-family: Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
      .label { font-family: Arial, sans-serif; font-size: 16px; fill: #334155; }
      .note { font-family: Arial, sans-serif; font-size: 18px; fill: #334155; }
      .foot { font-family: Arial, sans-serif; font-size: 15px; fill: #64748b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="1360" height="180" fill="url(#headerBand)"/>

  <text class="title" x="60" y="105">EmbodiedSceneAgent</text>
  <text class="sub" x="60" y="145">Closed-loop embodied replanning with explicit evidence boundaries</text>

  <rect class="chip" x="60" y="200" width="1240" height="62"/>
  <text class="chipText" x="680" y="239" text-anchor="middle">Observation -&gt; Scene Memory -&gt; Planner -&gt; Executor -&gt; Verifier -&gt; Replanner</text>

  <rect class="card" x="60" y="300" width="390" height="235"/>
  <text class="cardTitle" x="88" y="340">Primary quantitative (n=73)</text>
  <text class="metric" x="88" y="392">0.068 -&gt; 0.205</text>
  <text class="label" x="88" y="430">strict task proxy (baseline -&gt; tuned)</text>
  <text class="label" x="88" y="460">format compliance: 1.000 -&gt; 1.000</text>
  <text class="label" x="88" y="488">tool-use accuracy: 0.082 -&gt; 0.219</text>

  <rect class="card" x="485" y="300" width="390" height="235"/>
  <text class="cardTitle" x="513" y="340">Tiny controlled comparison</text>
  <text class="metric" x="513" y="392">0/3   3/3   2/3</text>
  <text class="label" x="513" y="430">accepted revised plans</text>
  <text class="label" x="513" y="460">baseline / VL-3B / VL-7B</text>
  <text class="label" x="513" y="488">same backend, batch, seed, fixed episodes</text>

  <rect class="card" x="910" y="300" width="390" height="235"/>
  <text class="cardTitle" x="938" y="340">Runtime safeguards</text>
  <text class="metric" x="938" y="392">Semantic filter + guard</text>
  <text class="label" x="938" y="430">blocks schema-valid plans that conflict</text>
  <text class="label" x="938" y="458">with scene memory constraints</text>
  <text class="label" x="938" y="486">records repeated-no-effect terminals for audit</text>

  <text class="note" x="60" y="605">Current evidence combines proxy metrics with a tiny controlled track.</text>
  <text class="note" x="60" y="637">This figure summarizes implementation status and observed behavior at a glance.</text>

  <text class="foot" x="60" y="710">Asset: assets/teaser_placeholder.svg</text>
</svg>

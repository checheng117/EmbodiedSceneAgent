<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .guard { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 12; ry: 12; }
      .model { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 12; ry: 12; }
      .t { font-family: Arial, sans-serif; font-size: 18px; fill: #0f172a; }
      .s { font-family: Arial, sans-serif; font-size: 14px; fill: #334155; }
      .link { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect class="box" x="30" y="70" width="170" height="58"/>
  <text class="t" x="115" y="106" text-anchor="middle">Observation</text>

  <rect class="box" x="235" y="70" width="190" height="58"/>
  <text class="t" x="330" y="106" text-anchor="middle">Scene Memory</text>

  <rect class="box" x="460" y="70" width="150" height="58"/>
  <text class="t" x="535" y="106" text-anchor="middle">Planner</text>

  <rect class="box" x="645" y="70" width="150" height="58"/>
  <text class="t" x="720" y="106" text-anchor="middle">Executor</text>

  <rect class="box" x="830" y="70" width="150" height="58"/>
  <text class="t" x="905" y="106" text-anchor="middle">Verifier</text>

  <rect class="box" x="1015" y="70" width="160" height="58"/>
  <text class="t" x="1095" y="106" text-anchor="middle">Replanner</text>

  <rect class="guard" x="1010" y="190" width="230" height="62"/>
  <text class="t" x="1125" y="224" text-anchor="middle">Semantic Acceptance Filter</text>

  <rect class="guard" x="785" y="300" width="230" height="62"/>
  <text class="t" x="900" y="334" text-anchor="middle">Repeated-No-Effect Guard</text>

  <rect class="model" x="455" y="300" width="260" height="62"/>
  <text class="t" x="585" y="334" text-anchor="middle">Tuned Model Path (Qwen2.5-VL-3B)</text>

  <path class="link" d="M200 99 H235"/>
  <path class="link" d="M425 99 H460"/>
  <path class="link" d="M610 99 H645"/>
  <path class="link" d="M795 99 H830"/>
  <path class="link" d="M980 99 H1015"/>

  <path class="link" d="M1095 128 V190"/>
  <path class="link" d="M1010 221 H795 V128"/>
  <path class="link dashed" d="M905 128 V300"/>
  <path class="link" d="M900 300 V252 H1010"/>

  <path class="link dashed" d="M585 300 V128"/>
  <path class="link dashed" d="M715 331 H1015"/>

  <text class="s" x="40" y="30">EmbodiedSceneAgent closed loop:</text>
  <text class="s" x="260" y="30">Observation ’ Scene Memory ’ Planner ’ Executor ’ Verifier ’ Replanner</text>

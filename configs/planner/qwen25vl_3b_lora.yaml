# Qwen2.5-VL-3B planner LoRA — 3090 开发 / 小批量实验（训练入口见 training/run_planner_sft.py）
model_id: Qwen/Qwen2.5-VL-3B-Instruct
precision: bf16
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
train:
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  max_steps: 2000
  learning_rate: 1.0e-4
eval:
  batch_size: 1
notes: "3090 24G：优先验证 JSON schema 与数据管线；正式报告以 A100 7B 为准。"

    <line x1="270" y1="72" x2="288" y2="72"/>
    <line x1="380" y1="72" x2="398" y2="72"/>
    <line x1="490" y1="72" x2="528" y2="72"/>
    <line x1="620" y1="72" x2="638" y2="72"/>
    <line x1="730" y1="72" x2="758" y2="72"/>
    <line x1="890" y1="72" x2="900" y2="72"/>
    <path d="M 690 94 Q 690 130 335 130 Q 80 130 75 94" stroke-dasharray="4 3"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
